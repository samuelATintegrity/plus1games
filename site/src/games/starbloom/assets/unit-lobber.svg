<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="8" height="8">
  <style>
    .tfs { fill: var(--team-fill, #c8a87c); stroke: var(--team-stroke, #6b4e2e) }
  </style>
  <!-- Lobber — triangular ranged caster -->
  <polygon points="4,0.8 7.5,7 0.5,7" class="tfs" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Inner robe detail -->
  <polygon points="4,2.5 6,6.5 2,6.5" fill="var(--team-stroke, #6b4e2e)" opacity="0.3"/>
  <!-- Eye -->
  <circle cx="4" cy="4.5" r="0.7" fill="var(--team-stroke, #6b4e2e)"/>
  <!-- Magic orb on top -->
  <circle cx="4" cy="1.2" r="0.7" fill="#b088d0" opacity="0.8"/>
  <circle cx="3.8" cy="1" r="0.3" fill="#d4b8e8" opacity="0.6"/>
</svg>
