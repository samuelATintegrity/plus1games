<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="8" height="8">
  <style>
    .tf { fill: var(--team-fill, #c8a87c) }
    .tfs { fill: var(--team-fill, #c8a87c); stroke: var(--team-stroke, #6b4e2e) }
  </style>
  <!-- Tower — defense tower with beacon top -->
  <!-- Base -->
  <rect x="1.5" y="3" width="5" height="4.5" rx="0.3" class="tfs" stroke-width="0.4"/>
  <!-- Narrow upper section -->
  <rect x="2" y="1.5" width="4" height="2.5" rx="0.3" class="tfs" stroke-width="0.4"/>
  <!-- Beacon/cap -->
  <polygon points="2.5,1.8 4,0.3 5.5,1.8" fill="var(--team-stroke, #6b4e2e)"/>
  <!-- Beacon glow -->
  <circle cx="4" cy="1" r="0.6" fill="#f0c040" opacity="0.8"/>
  <!-- Arrow slit -->
  <rect x="3.5" y="4" width="1" height="2" rx="0.2" fill="var(--team-stroke, #6b4e2e)"/>
</svg>
