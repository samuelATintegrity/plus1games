<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="8" height="8">
  <!-- Forest tile — dark green with tree trunk and canopy -->
  <rect width="8" height="8" fill="#2d5a27"/>
  <!-- Trunk -->
  <rect x="3" y="5" width="2" height="3" rx="0.3" fill="#6b4e2e"/>
  <!-- Canopy layers -->
  <ellipse cx="4" cy="3.5" rx="3.5" ry="2.8" fill="#3d7a34"/>
  <ellipse cx="4" cy="2.8" rx="2.8" ry="2" fill="#4a9240"/>
  <!-- Highlight -->
  <ellipse cx="3.2" cy="2.2" rx="1.2" ry="0.8" fill="#5ba832" opacity="0.5"/>
</svg>
