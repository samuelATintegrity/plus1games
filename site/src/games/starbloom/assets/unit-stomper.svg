<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" width="10" height="10">
  <style>
    .tfs { fill: var(--team-fill, #c8a87c); stroke: var(--team-stroke, #6b4e2e) }
  </style>
  <!-- Stomper — large beast, heavy melee -->
  <rect x="1" y="1.5" width="8" height="7.5" rx="1.2" class="tfs" stroke-width="0.6"/>
  <!-- Brow ridge -->
  <rect x="1.5" y="1.5" width="7" height="2" rx="0.5" fill="var(--team-stroke, #6b4e2e)"/>
  <!-- Eyes -->
  <rect x="2.5" y="2" width="1.5" height="1.2" rx="0.3" fill="#f5deb3" opacity="0.9"/>
  <rect x="6" y="2" width="1.5" height="1.2" rx="0.3" fill="#f5deb3" opacity="0.9"/>
  <!-- Mouth / jaw -->
  <rect x="3" y="6" width="4" height="2" rx="0.5" fill="var(--team-stroke, #6b4e2e)"/>
  <!-- Teeth -->
  <rect x="3.5" y="6" width="1" height="0.8" rx="0.2" fill="#f5deb3" opacity="0.6"/>
  <rect x="5.5" y="6" width="1" height="0.8" rx="0.2" fill="#f5deb3" opacity="0.6"/>
</svg>
