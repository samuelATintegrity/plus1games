<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <style>
    .tf { fill: var(--team-fill, #c8a87c) }
    .ts { stroke: var(--team-stroke, #6b4e2e); fill: none }
    .tfs { fill: var(--team-fill, #c8a87c); stroke: var(--team-stroke, #6b4e2e) }
  </style>
  <!-- Academy — research building with book/scroll motif -->
  <rect x="1" y="3" width="14" height="12" rx="1" class="tfs" stroke-width="0.6"/>
  <!-- Pediment / triangular top -->
  <polygon points="2,4 8,0.5 14,4" class="tfs" stroke-width="0.5"/>
  <!-- Columns -->
  <rect x="3" y="4" width="1.2" height="10" rx="0.3" fill="var(--team-stroke, #6b4e2e)"/>
  <rect x="11.8" y="4" width="1.2" height="10" rx="0.3" fill="var(--team-stroke, #6b4e2e)"/>
  <!-- Book emblem -->
  <rect x="5.5" y="7" width="5" height="4" rx="0.5" fill="var(--team-stroke, #6b4e2e)"/>
  <!-- Book pages -->
  <rect x="6" y="7.5" width="4" height="3" rx="0.3" fill="#f5deb3" opacity="0.6"/>
  <!-- Book spine -->
  <line x1="8" y1="7.2" x2="8" y2="10.8" stroke="var(--team-stroke, #6b4e2e)" stroke-width="0.4"/>
  <!-- Star on pediment -->
  <circle cx="8" cy="2" r="1" fill="#f0c040" opacity="0.7"/>
</svg>
