<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <style>
    .tf { fill: var(--team-fill, #c8a87c) }
    .ts { stroke: var(--team-stroke, #6b4e2e); fill: none }
    .tfs { fill: var(--team-fill, #c8a87c); stroke: var(--team-stroke, #6b4e2e) }
  </style>
  <!-- Nest — main base building with door and windows -->
  <!-- Base structure -->
  <rect x="1" y="4" width="14" height="11" rx="1" class="tfs" stroke-width="0.6"/>
  <!-- Roof -->
  <polygon points="0,5 8,0.5 16,5" class="tfs" stroke-width="0.5"/>
  <!-- Door -->
  <rect x="6" y="10" width="4" height="5" rx="0.5" fill="var(--team-stroke, #6b4e2e)"/>
  <rect x="7" y="11" width="2" height="3" rx="0.3" fill="#f5e6d0" opacity="0.4"/>
  <!-- Windows -->
  <rect x="2.5" y="6" width="3" height="2.5" rx="0.4" fill="var(--team-stroke, #6b4e2e)"/>
  <rect x="10.5" y="6" width="3" height="2.5" rx="0.4" fill="var(--team-stroke, #6b4e2e)"/>
  <!-- Window glow -->
  <rect x="3" y="6.4" width="2" height="1.5" rx="0.2" fill="#f5deb3" opacity="0.5"/>
  <rect x="11" y="6.4" width="2" height="1.5" rx="0.2" fill="#f5deb3" opacity="0.5"/>
</svg>
