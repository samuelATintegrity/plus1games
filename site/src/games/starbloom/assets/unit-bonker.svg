<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="8" height="8">
  <style>
    .tfs { fill: var(--team-fill, #c8a87c); stroke: var(--team-stroke, #6b4e2e) }
  </style>
  <!-- Bonker — stout square melee warrior -->
  <rect x="1" y="1.5" width="6" height="6" rx="0.8" class="tfs" stroke-width="0.5"/>
  <!-- Face plate / visor -->
  <rect x="2" y="2.5" width="4" height="2.5" rx="0.4" fill="var(--team-stroke, #6b4e2e)"/>
  <!-- Eyes through visor -->
  <rect x="2.5" y="3" width="1" height="1" rx="0.2" fill="#f5deb3" opacity="0.8"/>
  <rect x="4.5" y="3" width="1" height="1" rx="0.2" fill="#f5deb3" opacity="0.8"/>
  <!-- Club/weapon hint -->
  <rect x="6.5" y="3" width="1.2" height="3" rx="0.3" fill="#8a6e4a"/>
</svg>
