<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="8" height="8">
  <style>
    .tf { fill: var(--team-fill, #c8a87c) }
    .tfs { fill: var(--team-fill, #c8a87c); stroke: var(--team-stroke, #6b4e2e) }
  </style>
  <!-- Depot — open-top resource storage box -->
  <rect x="0.5" y="2" width="7" height="5.5" rx="0.5" class="tfs" stroke-width="0.5"/>
  <!-- Open top: lighter interior visible -->
  <rect x="1.2" y="1" width="5.6" height="2" fill="var(--team-stroke, #6b4e2e)"/>
  <rect x="1.5" y="1.2" width="5" height="1.5" fill="#f5deb3" opacity="0.3"/>
  <!-- Resource pile hint -->
  <ellipse cx="4" cy="5" rx="2.2" ry="1.2" fill="var(--team-stroke, #6b4e2e)" opacity="0.4"/>
</svg>
