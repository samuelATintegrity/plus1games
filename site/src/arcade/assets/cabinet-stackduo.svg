<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="16" height="20">
  <!-- Arcade cabinet — Stack Duo (tetris/block theme) -->
  <!-- Cabinet body -->
  <rect x="1" y="2" width="14" height="18" rx="1" fill="#1a2744" stroke="#16213e" stroke-width="0.5"/>
  <!-- Screen bezel -->
  <rect x="2" y="3" width="12" height="9" rx="0.5" fill="#0d1b2a"/>
  <!-- Screen content — dark grid -->
  <rect x="3" y="4" width="10" height="7" fill="#162d50"/>
  <!-- Falling blocks -->
  <rect x="4" y="4.5" width="1.8" height="1.8" rx="0.2" fill="#4fa3d1"/>
  <rect x="5.8" y="4.5" width="1.8" height="1.8" rx="0.2" fill="#4fa3d1"/>
  <rect x="4" y="6.3" width="1.8" height="1.8" rx="0.2" fill="#4fa3d1"/>
  <!-- Placed blocks -->
  <rect x="4" y="8.5" width="1.8" height="1.8" rx="0.2" fill="#e07045"/>
  <rect x="5.8" y="8.5" width="1.8" height="1.8" rx="0.2" fill="#e07045"/>
  <rect x="7.6" y="8.5" width="1.8" height="1.8" rx="0.2" fill="#f0c040"/>
  <rect x="9.4" y="8.5" width="1.8" height="1.8" rx="0.2" fill="#f0c040"/>
  <rect x="7.6" y="6.7" width="1.8" height="1.8" rx="0.2" fill="#e07045"/>
  <!-- Control panel -->
  <rect x="3" y="13" width="10" height="3" rx="0.5" fill="#2b4162"/>
  <!-- Buttons -->
  <circle cx="6" cy="14.5" r="0.8" fill="#4fa3d1"/>
  <circle cx="10" cy="14.5" r="0.8" fill="#e07045"/>
  <!-- Base -->
  <rect x="2" y="17" width="12" height="2" rx="0.5" fill="#16213e"/>
  <!-- Screen glow -->
  <rect x="3" y="4" width="10" height="7" fill="#4fa3d1" opacity="0.1" rx="0.5"/>
</svg>
