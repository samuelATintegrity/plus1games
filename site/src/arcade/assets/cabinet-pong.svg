<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="16" height="20">
  <!-- Arcade cabinet — Pong Beach Volleyball (warm beach tones) -->
  <!-- Cabinet body -->
  <rect x="1" y="2" width="14" height="18" rx="1" fill="#1a2744" stroke="#16213e" stroke-width="0.5"/>
  <!-- Screen bezel -->
  <rect x="2" y="3" width="12" height="9" rx="0.5" fill="#0d1b2a"/>
  <!-- Screen content — sandy court with net -->
  <rect x="3" y="4" width="10" height="7" fill="#f5d68a"/>
  <!-- Net line -->
  <line x1="8" y1="4" x2="8" y2="11" stroke="#eaf1f7" stroke-width="0.4" stroke-dasharray="0.8,0.5"/>
  <!-- Ball -->
  <circle cx="6" cy="7" r="0.8" fill="#eaf1f7" stroke="#c9a84c" stroke-width="0.3"/>
  <!-- Control panel -->
  <rect x="3" y="13" width="10" height="3" rx="0.5" fill="#2b4162"/>
  <!-- Buttons -->
  <circle cx="6" cy="14.5" r="0.8" fill="#e07045"/>
  <circle cx="10" cy="14.5" r="0.8" fill="#4fa3d1"/>
  <!-- Base -->
  <rect x="2" y="17" width="12" height="2" rx="0.5" fill="#16213e"/>
  <!-- Screen glow -->
  <rect x="3" y="4" width="10" height="7" fill="#f5d68a" opacity="0.15" rx="0.5"/>
</svg>
