<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="16" height="20">
  <!-- Arcade cabinet — Zookeepers (Pac-Man/maze theme) -->
  <!-- Cabinet body -->
  <rect x="1" y="2" width="14" height="18" rx="1" fill="#1a2744" stroke="#16213e" stroke-width="0.5"/>
  <!-- Screen bezel -->
  <rect x="2" y="3" width="12" height="9" rx="0.5" fill="#0d1b2a"/>
  <!-- Screen content — dark maze -->
  <rect x="3" y="4" width="10" height="7" fill="#0d1b2a"/>
  <!-- Maze walls (simplified) -->
  <rect x="3" y="4" width="10" height="0.6" fill="#2b4162"/>
  <rect x="3" y="10.4" width="10" height="0.6" fill="#2b4162"/>
  <rect x="3" y="4" width="0.6" height="7" fill="#2b4162"/>
  <rect x="12.4" y="4" width="0.6" height="7" fill="#2b4162"/>
  <rect x="5" y="6" width="3" height="0.6" fill="#2b4162"/>
  <rect x="9" y="6" width="2" height="0.6" fill="#2b4162"/>
  <rect x="6" y="8" width="4" height="0.6" fill="#2b4162"/>
  <!-- Pac-Man (zookeeper) -->
  <circle cx="5" cy="8.5" r="1.2" fill="#f0c040"/>
  <polygon points="5,8.5 6.2,7.8 6.2,9.2" fill="#0d1b2a"/>
  <!-- Ghost (animal) -->
  <rect x="9.5" y="5" width="2" height="2.2" rx="1" fill="#e07045"/>
  <rect x="9.5" y="6.2" width="0.5" height="0.6" fill="#0d1b2a"/>
  <rect x="11" y="6.2" width="0.5" height="0.6" fill="#0d1b2a"/>
  <!-- Dots -->
  <circle cx="7" cy="5.5" r="0.3" fill="#eaf1f7"/>
  <circle cx="8.5" cy="5.5" r="0.3" fill="#eaf1f7"/>
  <circle cx="7" cy="9.5" r="0.3" fill="#eaf1f7"/>
  <!-- Control panel -->
  <rect x="3" y="13" width="10" height="3" rx="0.5" fill="#2b4162"/>
  <!-- Joystick -->
  <circle cx="6" cy="14.5" r="0.8" fill="#f0c040"/>
  <circle cx="10" cy="14.5" r="0.8" fill="#e07045"/>
  <!-- Base -->
  <rect x="2" y="17" width="12" height="2" rx="0.5" fill="#16213e"/>
  <!-- Screen glow -->
  <rect x="3" y="4" width="10" height="7" fill="#2b4162" opacity="0.1" rx="0.5"/>
</svg>
