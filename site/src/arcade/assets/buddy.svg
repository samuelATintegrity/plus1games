<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Buddy player variant — slightly transparent, different accent color -->
  <!-- Body -->
  <circle cx="8" cy="9" r="5" fill="#a78bfa" stroke="#16213e" stroke-width="1" opacity="0.75"/>
  <!-- Face highlight -->
  <ellipse cx="7" cy="8" rx="2.5" ry="2" fill="#c4b5fd" opacity="0.35"/>
  <!-- Eyes -->
  <circle cx="6.5" cy="8" r="1" fill="#16213e" opacity="0.75"/>
  <circle cx="9.5" cy="8" r="1" fill="#16213e" opacity="0.75"/>
  <!-- Eye highlights -->
  <circle cx="6.2" cy="7.6" r="0.4" fill="#eaf1f7" opacity="0.75"/>
  <circle cx="9.2" cy="7.6" r="0.4" fill="#eaf1f7" opacity="0.75"/>
  <!-- Smile -->
  <path d="M6.5 10.5 Q8 12 9.5 10.5" fill="none" stroke="#16213e" stroke-width="0.6" stroke-linecap="round" opacity="0.75"/>
  <!-- Antenna -->
  <line x1="8" y1="4" x2="8" y2="2" stroke="#16213e" stroke-width="0.8" stroke-linecap="round" opacity="0.75"/>
  <circle cx="8" cy="1.5" r="0.8" fill="#e879f9" opacity="0.75"/>
</svg>
