<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="16" height="20">
  <!-- Arcade cabinet — Starbloom (nature/RTS theme) -->
  <!-- Cabinet body -->
  <rect x="1" y="2" width="14" height="18" rx="1" fill="#1a2744" stroke="#16213e" stroke-width="0.5"/>
  <!-- Screen bezel -->
  <rect x="2" y="3" width="12" height="9" rx="0.5" fill="#0d1b2a"/>
  <!-- Screen content — green terrain -->
  <rect x="3" y="4" width="10" height="7" fill="#4a7c4f"/>
  <!-- Trees -->
  <rect x="4" y="5" width="2" height="2" rx="0.5" fill="#2d5a30"/>
  <rect x="9" y="6" width="2" height="2" rx="0.5" fill="#2d5a30"/>
  <!-- Starbloom flower -->
  <polygon points="8,4.5 9,6.5 7,6.5" fill="#f0c040" stroke="#d4a030" stroke-width="0.3"/>
  <!-- Small unit -->
  <circle cx="6" cy="9" r="0.7" fill="#8bc34a" stroke="#2d5a30" stroke-width="0.3"/>
  <!-- Control panel -->
  <rect x="3" y="13" width="10" height="3" rx="0.5" fill="#2b4162"/>
  <!-- Buttons -->
  <circle cx="6" cy="14.5" r="0.8" fill="#4caf50"/>
  <circle cx="10" cy="14.5" r="0.8" fill="#f0c040"/>
  <!-- Base -->
  <rect x="2" y="17" width="12" height="2" rx="0.5" fill="#16213e"/>
  <!-- Screen glow -->
  <rect x="3" y="4" width="10" height="7" fill="#4a7c4f" opacity="0.15" rx="0.5"/>
</svg>
